  </defs>

  <rect width="1200" height="320" fill="#EEE3D1"/>
  <rect x="12" y="12" width="1176" height="296" rx="18" fill="#EEE3D1" stroke="#111111" stroke-width="4"/>
  <rect x="24" y="24" width="1152" height="272" rx="14" fill="url(#dots)"/>

  <!-- top accents -->
  <rect x="40" y="36" width="100" height="16" fill="#D46A4C"/>
