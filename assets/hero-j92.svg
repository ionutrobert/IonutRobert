  <rect x="436" y="74" width="372" height="30" fill="#D8CAB1" stroke="#111111" stroke-width="4"/>
  <circle cx="458" cy="89" r="5" fill="#D46A4C"/>
  <circle cx="476" cy="89" r="5" fill="#C4933A"/>
  <circle cx="494" cy="89" r="5" fill="#27483E"/>
  <text x="516" y="94" fill="#111111" font-size="13"
        font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">/j92/profile</text>

  <g clip-path="url(#terminalClip)">
    <rect x="456" y="110" width="332" height="140" fill="#171717"/>
    <text x="476" y="142" fill="#EAE1D0" font-size="22"
          font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">$ whoami</text>
    <text x="476" y="172" fill="#C4933A" font-size="24" font-weight="700"
