<text x="526" y="232" fill="#A9B7AE" font-size="18"
          font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">"automation", "ai tools"]</text>

    <rect x="520" y="156" width="10" height="18" fill="#EAE1D0">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>





<g transform="translate(920, 45) scale(14)">
  <g>
    <!-- Animație Săritură -->
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -2; 0 0" dur="0.8s" repeatCount="indefinite" />
    
    <!-- Corp Rață -->
    <path d="M5 5h5v1H5zM4 6h7v1H4zM3 7h9v5H3zM4 12h7v1H4z" fill="#FFD700" />
    <!-- Cioc -->
    <path d="M11 8h2v2h-2zM10 9h1v1h-1z" fill="#FF8C00" />
    
    <!-- Ochi cu Clipit -->
    <rect x="8" y="7" width="1" height="1" fill="#000">
      <animate attributeName="opacity" values="1;1;0;1;1" dur="1s" repeatCount="indefinite" />
    </rect>

    <!-- Aripă cu Flap -->
    <path d="M4 9h3v1H4z" fill="#F0C600">
      <animateTransform attributeName="transform" type="rotate" values="0 4 9; -30 4 9; 0 4 9" dur="0.4s" repeatCount="indefinite" additive="sum" />
    </path>
  </g>
</g>




 <g transform="translate(720, 125)">
        <svg width="40" height="40" viewBox="0 0 10 10" shape-rendering="crispEdges">
